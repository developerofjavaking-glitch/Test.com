<body>

    <!-- Top Adsterra Banner -->

            atOptions = { 'key' : '716f86d996de950740eca539a9e61880', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };

        <h1>BOOM AI</h1>
        
        <!-- API Key Input (Safe for GitHub) -->
        <div class="key-section">
            <label>Enter OpenRouter API Key:</label>
            <input type="password" id="apiKey" placeholder="sk-or-v1-xxxx...">
        </div>

        <textarea id="prompt" placeholder="Describe your image..."></textarea>
        <button id="genBtn" class="btn-boom">BOOM! GENERATE</button>
        
        <a href="https://www.effectivecpmnetwork.com/jm8fd1svf0?key=5e666a1fe765105ec205d34b4611c75a" class="smart-link">Get Free Premium Credits ✨</a>

        <div class="result-box" id="resultBox">
            <p id="loadingText" style="display:none;">Creating Magic...</p>
            <img id="outImg">
        </div>
        
        <a id="dlBtn" style="display:none; color: #10b981; margin-top: 10px; text-decoration:none; font-weight:bold;" download="boom.png">Download Image</a>
    </div>

    <!-- Native Ad -->
    <div class="ad-slot">
        <script async="async" data-cfasync="false" src="https://pl29644925.effectivecpmnetwork.com/278e2b261f4ff235cb3bf7feef2de640/invoke.js"></script>
        <div id="container-278e2b261f4ff235cb3bf7feef2de640"></div>
    </div>

    <script>
        const genBtn = document.getElementById('genBtn');
        const outImg = document.getElementById('outImg');
        const loader = document.getElementById('loadingText');

        // Automatically load key if saved in browser
        window.onload = () => {
            const savedKey = localStorage.getItem('user_api_key');
            if(savedKey) document.getElementById('apiKey').value = savedKey;
        };

        genBtn.addEventListener('click', async () => {
            const key = document.getElementById('apiKey').value;
            const prompt = document.getElementById('prompt').value;
            
            if(!key || !prompt) return alert("Please enter both API Key and Prompt!");
            
            // Save key locally so user doesn't have to re-type
            localStorage.setItem('user_api_key', key);

            loader.style.display = 'block';
            outImg.style.display = 'none';
            genBtn.disabled = true;

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "x-ai/grok-imagine-image-quality",
                        messages: [{ role: "user", content: prompt }],
                        modalities: ["image"]
                    })
                });

                const data = await res.json();
                const url = data.choices[0].message.images[0].image_url.url;
                
                outImg.src = url;
                outImg.style.display = 'block';
                document.getElementById('dlBtn').style.display = 'block';
                document.getElementById('dlBtn').href = url;
            } catch (e) {
                alert("Error: Check your API Key or Balance.");
            } finally {
                loader.style.display = 'none';
                genBtn.disabled = false;
            }
        });
    </script>
</body>
